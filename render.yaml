databases:
  - name: skillconnect-db
    plan: free
    region: singapore
    databaseName: skillconnect
    user: skillconnect

services:
  - type: web
    name: skillconnect-api
    runtime: docker
    rootDir: backend
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillconnect-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: skillconnect-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: skillconnect-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: 86400000
      - key: GOOGLE_CLIENT_ID
        value: 737302176157-8b23ul5niaom24ur5pukhcllt89gmfir.apps.googleusercontent.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://skillconnect-frontend.onrender.com

  - type: web
    name: skillconnect-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://skillconnect-api.onrender.com/api
      - key: VITE_GOOGLE_CLIENT_ID
        value: 737302176157-8b23ul5niaom24ur5pukhcllt89gmfir.apps.googleusercontent.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
